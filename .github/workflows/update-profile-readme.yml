name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate featured repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: chao-eng
          PROFILE_REPO_LIMIT: 6
        run: node scripts/generate-profile-readme.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet README.md profile-metrics.json; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md profile-metrics.json
          git commit -m "chore: update profile README"
          git push
